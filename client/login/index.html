<h2 class="text-xl font-semibold mb-4 text-center">Login Required</h2>
<form id="login-form" class="flex flex-col gap-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="login-email">Email</label>
    <input id="login-email" name="email" type="email" required placeholder="you@example.com" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="login-password">Password</label>
    <input id="login-password" name="password" type="password" required placeholder="••••••••" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
  </div>
  <button type="submit" class="btn-primary w-full">Login</button>
  <div id="login-error" class="text-sm text-red-600 min-h-[1.25rem]"></div>
</form>
