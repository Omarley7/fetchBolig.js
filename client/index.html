<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Findbolig Fetcher</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/dist/styles.css" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/json-enc.js"></script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
      <!-- Header -->
      <header class="mb-8">
        <h1 class="text-4xl font-bold text-gray-900 mb-2">FetchBolig.ts</h1>
        <p class="text-gray-600">Demokratiser din data - gem en lokal kopi</p>
      </header>

      <!-- Auth Modal Placeholder -->
      <div
        id="login-modal"
        class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm items-center justify-center z-50"
      >
        <div
          class="bg-white rounded-lg shadow-lg w-full max-w-md p-6 relative"
          id="login-modal-content"
        >
          <!-- Login form will be injected here -->
          <button
            type="button"
            onclick="hideLoginModal()"
            class="absolute top-2 right-2 text-gray-400 hover:text-gray-600"
          >
            ✕
          </button>
          <div class="text-center text-sm text-gray-500">Loading...</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="flex flex-wrap gap-3 mb-6">
        <button
          onclick="updateAll()"
          class="btn-primary flex items-center gap-2"
        >
          � Update All
        </button>
        <button
          onclick="loadFromStorage()"
          class="bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors"
        >
          📂 Load Local
        </button>
        <button
          onclick="clearStorage()"
          class="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700 transition-colors"
        >
          🗑️ Clear
        </button>
      </div>

      <!-- Stats -->
      <div id="stats" class="mb-6 p-4 bg-blue-50 rounded-lg">
        <div class="grid grid-cols-2 gap-4 text-center">
          <div>
            <div class="text-2xl font-bold text-blue-600" id="offers-count">
              0
            </div>
            <div class="text-sm text-gray-600">Offers in Storage</div>
          </div>
          <div>
            <div class="text-2xl font-bold text-purple-600" id="threads-count">
              0
            </div>
            <div class="text-sm text-gray-600">Threads in Storage</div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="mb-4 border-b border-gray-200">
        <nav class="flex gap-4">
          <button
            onclick="showTab('offers')"
            id="tab-offers"
            class="tab-button active"
          >
            Offers
          </button>
          <button
            onclick="showTab('threads')"
            id="tab-threads"
            class="tab-button"
          >
            Message Threads
          </button>
        </nav>
      </div>

      <!-- Content Sections -->
      <div id="content-offers" class="tab-content">
        <div id="offers-list" class="grid gap-4">
          <!-- Populated by JS -->
        </div>
      </div>

      <div id="content-threads" class="tab-content hidden">
        <div id="threads-list" class="grid gap-4">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <script type="module" src="/dist/app.js"></script>
    <script type="module" src="/dist/login.js"></script>
  </body>
</html>
